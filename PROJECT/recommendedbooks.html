<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Book Recommendation Form</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --border-color: #333;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            border: 3px solid var(--border-color);
            padding: 30px;
            background-color: white;
            width: 100%;
            max-width: 900px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            border: 2px solid var(--border-color);
            padding: 15px;
            margin: 0 0 30px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: #fff;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            border: 2px solid var(--border-color);
            padding: 25px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--border-color);
        }

        /* Image Upload Area */
        .upload-section {
            border: 2px dashed var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f9f9f9;
            min-height: 300px;
            position: relative;
            overflow: hidden;
        }

        #preview-img {
            max-width: 100%;
            max-height: 100%;
            display: none; /* Hidden until image uploaded */
            object-fit: contain;
        }

        .upload-label {
            cursor: pointer;
            text-align: center;
            padding: 20px;
        }

        /* Submit Button */
        .submit-area {
            text-align: center;
        }

        .submit-btn {
            background-color: var(--border-color);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #555;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Recommend Books</h1>

    <form id="recommendForm">
        <div class="form-grid">
            <div class="inputs">
                <div class="input-group">
                    <label>Book Name</label>
                    <input type="text" placeholder="Enter book title" required>
                </div>

                <div class="input-group">
                    <label>Author Name</label>
                    <input type="text" placeholder="Enter full name" required>
                </div>

                <div class="input-group">
                    <label>Availability Status</label>
                    <select required>
                        <option value="" disabled selected>Select an option...</option>
                        <option value="in-library">Already in Library</option>
                        <option value="missing">Not in Library</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>ISBN Number</label>
                    <input type="text" placeholder="e.g. 978-3-16-148410-0">
                </div>

                <div class="input-group">
                    <label>No. of Copies Required</label>
                    <input type="number" min="1" placeholder="Quantity">
                </div>

                <div class="input-group">
                    <label>Reason for Recommending</label>
                    <textarea placeholder="Tell us why this book is needed..."></textarea>
                </div>
            </div>

            <div class="upload-section" id="dropZone">
                <label class="upload-label" id="uploadPlaceholder">
                    <strong>BOOK PIC (UPLOAD PHOTO)</strong><br>
                    <small>Click to browse or drag & drop</small>
                    <input type="file" id="imgInput" accept="image/*" style="display:none">
                </label>
                <img id="preview-img" src="#" alt="Book Preview">
            </div>
        </div>

        <div class="submit-area">
            <button type="submit" class="submit-btn">Submit Recommendation</button>
        </div>
    </form>
</div>

<script>
    // Logic for Image Preview
    const imgInput = document.getElementById('imgInput');
    const previewImg = document.getElementById('preview-img');
    const placeholder = document.getElementById('uploadPlaceholder');

    imgInput.onchange = evt => {
        const [file] = imgInput.files;
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            placeholder.style.display = 'none';
        }
    }

    // Form Submit handling
    document.getElementById('recommendForm').onsubmit = (e) => {
        e.preventDefault();
        alert('Book recommendation submitted successfully!');
    };
</script>

</body>
</html>
